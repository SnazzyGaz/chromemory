<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#26262a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chromemory">
<meta name="mobile-web-app-capable" content="yes">

<!-- FIXED for GitHub Pages -->
<link rel="manifest" href="/QRsuite/manifest.json">

<title>Chromemory</title>

<style>
/* Your existing CSS stays exactly the same */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

/* ... (all your :root, *, html, body, .screen, etc. styles unchanged) ... */
</style>
</head>
<body>

<!-- Your entire HTML body (all screens, modals, etc.) stays exactly the same -->

<!-- ADD THIS just before the closing </body> tag, after your existing scripts -->

<script>
  // === PWA Install Handling for GitHub Pages ===
  let deferredPrompt;

  const installButtonHTML = `
    <button id="install-btn" class="primary-btn" style="margin-top:12px;display:none">
      📱 Add to Home Screen
    </button>
  `;

  // Insert install button on home screen (you can move it elsewhere if preferred)
  const homeInner = document.querySelector('.home-inner');
  if (homeInner) homeInner.insertAdjacentHTML('beforeend', installButtonHTML);

  const installBtn = document.getElementById('install-btn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'block';
  });

  if (installBtn) {
    installBtn.addEventListener('click', () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choice) => {
        if (choice.outcome === 'accepted') {
          installBtn.style.display = 'none';
        }
        deferredPrompt = null;
      });
    });
  }

  // Service Worker registration — FIXED path + scope
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/QRsuite/sw.js', {
        scope: '/QRsuite/'
      }).then(reg => {
        console.log('Service Worker registered for QRsuite with scope:', reg.scope);
      }).catch(err => {
        console.error('Service Worker registration failed:', err);
      });
    });
  }
</script>

</body>
</html>
